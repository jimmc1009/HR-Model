name: MLB Model Pipeline

on:
 workflow_dispatch:

jobs:
 run-pipeline:
   runs-on: ubuntu-latest
   permissions:
     contents: write

   steps:
     - name: Checkout repo
       uses: actions/checkout@v4
       with:
         token: ${{ secrets.GITHUB_TOKEN }}

     - name: Set up Python
       uses: actions/setup-python@v5
       with:
         python-version: "3.11"

     - name: Install dependencies
       run: |
         pip install pybaseball pandas numpy gspread oauth2client pytz requests google-auth

     # ── Shared data pulls ─────────────────────────────────────────────────
     - name: Run main.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python main.py

     - name: Run pitcher_statcast.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python pitcher_statcast.py

     - name: Run park_factors.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python park_factors.py

     - name: Run weather.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python weather.py

     - name: Run odds.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
         ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
       run: python odds.py

     # ── HR Model (v1 — LIVE, feeds dashboard) ─────────────────────────────
     - name: Run hr_picks.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python hr_picks.py

     # ── HR Model (v2 — SHADOW, logs to *_v2 tabs for comparison) ───────────
     - name: Run hr_picks_v2.py (shadow)
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python hr_picks_v2.py

     # ── H+R+RBI Model ─────────────────────────────────────────────────────
     - name: Run hrrbi_statcast.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python hrrbi_statcast.py

     - name: Run hrrbi_picks.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python hrrbi_picks.py

     # ── Pitcher Strikeout Model ───────────────────────────────────────────
     - name: Run ks_statcast.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python ks_statcast.py

     - name: Run ks_picks.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python ks_picks.py

     # ── Resolve picks (before analysis and dashboard) ─────────────────────
     - name: Run resolve_picks.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python resolve_picks.py

     # ── Analysis (uses resolved data) ─────────────────────────────────────
     - name: Run hr_analysis.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python hr_analysis.py

     - name: Run ks_analysis.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python ks_analysis.py

     - name: Run hrrbi_analysis.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python hrrbi_analysis.py

     # ── Dashboard (uses resolved data + analysis) ─────────────────────────
     - name: Run dashboard.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python dashboard.py

     # ── HR Cards (styled visual view of HR Value Plays) ────────────────────
     - name: Run hr_cards.py
       env:
         GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
         GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
       run: python hr_cards.py

     - name: Upload HR cards (artifact backup)
       uses: actions/upload-artifact@v4
       with:
         name: hr-cards
         path: hr_cards.html

     - name: Commit HR cards to repo
       run: |
         git config user.name "github-actions[bot]"
         git config user.email "github-actions[bot]@users.noreply.github.com"
         git add hr_cards.html
         git diff --staged --quiet || git commit -m "Update hr_cards.html [auto]"
         git push origin main
