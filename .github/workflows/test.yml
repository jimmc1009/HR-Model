name: MLB Model — Test Runner

on:
  workflow_dispatch:
    inputs:
      script:
        description: "Script to run"
        required: true
        default: "full"
        type: choice
        options:
          # ── Full pipelines ──────────────────────────────────────
          - full                    # All three models end-to-end
          - full_hr                 # HR model only (main → pitcher_statcast → park → weather → odds → hr_picks)
          - full_hrrbi              # HRRBI model only (hrrbi_statcast → hrrbi_picks)
          - full_ks                 # KS model only (ks_statcast → ks_picks)
          # ── Shared data scripts ────────────────────────────────
          - main
          - pitcher_statcast
          - park_factors
          - weather
          - odds
          # ── HR model ───────────────────────────────────────────
          - hr_picks
          - backtest
          # ── HRRBI model ────────────────────────────────────────
          - hrrbi_statcast
          - hrrbi_picks
          # ── KS model ───────────────────────────────────────────
          - ks_statcast
          - ks_picks

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (dev branch)
        uses: actions/checkout@v3
        with:
          ref: dev

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pybaseball pandas numpy gspread oauth2client pytz requests

      # ── Shared prerequisites (always run for picks scripts) ───────────────
      - name: Run main.py
        if: >
          inputs.script == 'full' ||
          inputs.script == 'full_hr' ||
          inputs.script == 'full_hrrbi' ||
          inputs.script == 'full_ks' ||
          inputs.script == 'main' ||
          inputs.script == 'hr_picks' ||
          inputs.script == 'hrrbi_picks' ||
          inputs.script == 'ks_picks'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: "1e_iMlYn-2wwaXg2DUeV-BDIR6CNZzloniqZpe_TsAIU"
        run: python main.py

      - name: Run pitcher_statcast.py
        if: >
          inputs.script == 'full' ||
          inputs.script == 'full_hr' ||
          inputs.script == 'pitcher_statcast' ||
          inputs.script == 'hr_picks'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: "1e_iMlYn-2wwaXg2DUeV-BDIR6CNZzloniqZpe_TsAIU"
        run: python pitcher_statcast.py

      - name: Run park_factors.py
        if: >
          inputs.script == 'full' ||
          inputs.script == 'full_hr' ||
          inputs.script == 'full_hrrbi' ||
          inputs.script == 'full_ks' ||
          inputs.script == 'park_factors' ||
          inputs.script == 'hr_picks' ||
          inputs.script == 'hrrbi_picks' ||
          inputs.script == 'ks_picks'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: "1e_iMlYn-2wwaXg2DUeV-BDIR6CNZzloniqZpe_TsAIU"
        run: python park_factors.py

      - name: Run weather.py
        if: >
          inputs.script == 'full' ||
          inputs.script == 'full_hr' ||
          inputs.script == 'weather' ||
          inputs.script == 'hr_picks'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: "1e_iMlYn-2wwaXg2DUeV-BDIR6CNZzloniqZpe_TsAIU"
        run: python weather.py

      - name: Run odds.py
        if: >
          inputs.script == 'full' ||
          inputs.script == 'full_hr' ||
          inputs.script == 'odds' ||
          inputs.script == 'hr_picks'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: "1e_iMlYn-2wwaXg2DUeV-BDIR6CNZzloniqZpe_TsAIU"
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python odds.py

      # ── HR model ──────────────────────────────────────────────────────────
      - name: Run hr_picks.py
        if: >
          inputs.script == 'full' ||
          inputs.script == 'full_hr' ||
          inputs.script == 'hr_picks'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: "1e_iMlYn-2wwaXg2DUeV-BDIR6CNZzloniqZpe_TsAIU
        run: python hr_picks.py

      - name: Run backtest.py
        if: inputs.script == 'backtest'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: "1e_iMlYn-2wwaXg2DUeV-BDIR6CNZzloniqZpe_TsAIU"
        run: python backtest.py

      # ── HRRBI model ───────────────────────────────────────────────────────
      - name: Run hrrbi_statcast.py
        if: >
          inputs.script == 'full' ||
          inputs.script == 'full_hrrbi' ||
          inputs.script == 'hrrbi_statcast' ||
          inputs.script == 'hrrbi_picks'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: "1e_iMlYn-2wwaXg2DUeV-BDIR6CNZzloniqZpe_TsAIU"
        run: python hrrbi_statcast.py

      - name: Run hrrbi_picks.py
        if: >
          inputs.script == 'full' ||
          inputs.script == 'full_hrrbi' ||
          inputs.script == 'hrrbi_picks'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: "1dev_sheet_id_placeholder"
        run: python hrrbi_picks.py

      # ── KS model ──────────────────────────────────────────────────────────
      - name: Run ks_statcast.py
        if: >
          inputs.script == 'full' ||
          inputs.script == 'full_ks' ||
          inputs.script == 'ks_statcast' ||
          inputs.script == 'ks_picks'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: "1dev_sheet_id_placeholder"
        run: python ks_statcast.py

      - name: Run ks_picks.py
        if: >
          inputs.script == 'full' ||
          inputs.script == 'full_ks' ||
          inputs.script == 'ks_picks'
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: "1dev_sheet_id_placeholder"
        run: python ks_picks.py
