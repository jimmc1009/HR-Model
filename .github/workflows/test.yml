name: Test HR Model
on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Which script to run'
        required: false
        default: 'hr_picks.py'
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GOOGLE_SHEET_ID: "1e_iMlYn-2wwaXg2DUeV-BDIR6CNZzloniqZpe_TsAIU"
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: dev
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python ${{ github.event.inputs.script }}
      - run: |
          python main.py
          python pitcher_statcast.py
          python park_factors.py
          python weather.py
          python hr_picks.py
