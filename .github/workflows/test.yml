name: Test HR Model
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: full pipeline or single script'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - main.py
          - pitcher_statcast.py
          - park_factors.py
          - weather.py
          - odds.py
          - hrrbi_statcast.py
          - ks_statcast.py
          - hr_picks.py
          - hrrbi_picks.py
          - ks_picks.py
          - backtest.py
          - dashboard.py
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GOOGLE_SHEET_ID: "1e_iMlYn-2wwaXg2DUeV-BDIR6CNZzloniqZpe_TsAIU"
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: dev
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run full pipeline
        if: github.event.inputs.mode == 'full'
        run: |
          python main.py
          python pitcher_statcast.py
          python park_factors.py
          python weather.py
          python hrrbi_statcast.py
          python ks_statcast.py
          python odds.py
          python hr_picks.py
          python hrrbi_picks.py
          python ks_picks.py
      - name: Run single script
        if: github.event.inputs.mode != 'full'
        run: python ${{ github.event.inputs.mode }}
